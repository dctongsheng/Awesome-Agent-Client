name: Add an agent client
description: Suggest a desktop, IDE, extension, CLI, TUI, or local agent client.
title: "Add: "
labels:
  - enhancement
body:
  - type: input
    id: name
    attributes:
      label: Client name
      description: The public name of the agent client.
      placeholder: "Example: Codex CLI"
    validations:
      required: true
  - type: input
    id: official-link
    attributes:
      label: Official link
      description: Use the official website, documentation page, or repository.
      placeholder: "https://example.com"
    validations:
      required: true
  - type: dropdown
    id: client-type
    attributes:
      label: Client type
      options:
        - Desktop
        - IDE / workspace
        - Editor extension
        - CLI / TUI
        - Web / cloud control surface
        - Protocol / ecosystem
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Category
      description: Choose the README section where this client should be added.
      options:
        - General Desktop Agents
        - Agentic IDEs and Workspaces
        - Editor Extensions
        - Terminal and TUI Agents
        - Local-First and Open-Source Clients
        - Related Standards and Ecosystem
    validations:
      required: true
  - type: input
    id: platforms
    attributes:
      label: Platforms
      description: List supported platforms.
      placeholder: "macOS, Windows, Linux"
    validations:
      required: true
  - type: textarea
    id: english-entry
    attributes:
      label: English entry
      description: Paste the exact Markdown line to add to README.en.md.
      placeholder: "- [Client Name](https://example.com) - One sentence description. Platforms: macOS, Windows, Linux. Type: Desktop / IDE / Extension / CLI. License: Open source / Proprietary / Freemium. Last checked: 2026-06-24."
    validations:
      required: true
  - type: textarea
    id: chinese-entry
    attributes:
      label: Chinese entry
      description: Paste the exact Markdown line to add to README.md.
      placeholder: "- [Client Name](https://example.com) - 一句话说明它是什么、为什么有用。Platforms: macOS, Windows, Linux. Type: Desktop / IDE / Extension / CLI. License: Open source / Proprietary / Freemium. Last checked: 2026-06-24."
    validations:
      required: true
  - type: textarea
    id: why-awesome
    attributes:
      label: Why awesome?
      description: Explain the agentic capabilities and why it belongs here.
      placeholder: "It can edit files, run commands, use MCP tools, and manage multi-step coding tasks."
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Extra notes
      description: Add license/model info, install notes, or anything maintainers should verify.
    validations:
      required: false
